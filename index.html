<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>H'apps Qr Kod</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f5f5f5;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        .header img {
            height: 140px;
            width: auto;
        }

        .header .school-name {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            text-align: left;
        }

        /* Kamera çerçeve sarmalayıcı */
        .reader-wrapper {
            position: relative;
            width: 380px;
            height: 380px;
            margin: 0 auto;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        /* Köşe çerçeve elemanları */
        .corner {
            position: absolute;
            width: 36px;
            height: 36px;
            z-index: 10;
            pointer-events: none;
        }
        .corner-tl { top: 6px; left: 6px; border-top: 5px solid #4CAF50; border-left: 5px solid #4CAF50; border-radius: 4px 0 0 0; }
        .corner-tr { top: 6px; right: 6px; border-top: 5px solid #4CAF50; border-right: 5px solid #4CAF50; border-radius: 0 4px 0 0; }
        .corner-bl { bottom: 6px; left: 6px; border-bottom: 5px solid #4CAF50; border-left: 5px solid #4CAF50; border-radius: 0 0 0 4px; }
        .corner-br { bottom: 6px; right: 6px; border-bottom: 5px solid #4CAF50; border-right: 5px solid #4CAF50; border-radius: 0 0 4px 0; }

        /* Tarama çizgisi animasyonu */
        .scan-line {
            position: absolute;
            left: 10px;
            right: 10px;
            height: 3px;
            background: linear-gradient(to right, transparent, #4CAF50, transparent);
            z-index: 10;
            pointer-events: none;
            animation: scanMove 2s linear infinite;
        }

        @keyframes scanMove {
            0%   { top: 10px; opacity: 1; }
            90%  { top: calc(100% - 10px); opacity: 1; }
            100% { top: calc(100% - 10px); opacity: 0; }
        }

        /* Modal arka planı */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        /* Modal kutusu */
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: popIn 0.3s ease;
            min-width: 280px;
        }

        @keyframes popIn {
            0%   { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1);   opacity: 1; }
        }

        .modal-icon {
            font-size: 52px;
            margin-bottom: 10px;
        }

        .modal-title {
            font-size: 18px;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-code {
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
            letter-spacing: 6px;
            margin: 10px 0 30px 0;
        }

        .modal-error .modal-icon { color: #f44336; }
        .modal-error .modal-code { color: #f44336; font-size: 22px; letter-spacing: 1px; }

        .modal-close-btn {
            font-size: 18px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px 36px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-close-btn:hover {
            background-color: #388e3c;
        }

        .modal-error .modal-close-btn {
            background-color: #f44336;
        }
        .modal-error .modal-close-btn:hover {
            background-color: #c62828;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="header">
        <img src="logo.jpg" alt="Okul Logo">
        <div class="school-name">H'apps Qr Kod</div>
    </div>

    <!-- Kamera + çerçeve -->
    <div class="reader-wrapper">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="scan-line"></div>
        <div id="reader"></div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" id="modalBox">
            <div class="modal-icon" id="modalIcon">✅</div>
            <div class="modal-title" id="modalTitle">Okunan Kod</div>
            <div class="modal-code" id="modalCode">000000</div>
            <button class="modal-close-btn" onclick="closeModal()">Tamam</button>
        </div>
    </div>

    <script>
        let html5QrcodeScanner = null;
        let modalOpen = false;

        function decryptCode(encryptedText) {
            try {
                let number = parseFloat(encryptedText);
                
                if (isNaN(number)) {
                    throw new Error("Geçerli bir sayı değil");
                }

                // Günün tarihini DDMMYYYY formatında al
                const now = new Date();
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear();
                const dateNumber = parseFloat(`${day}${month}${year}`);

                // Tarihe böl, karekök al
                let step1 = number / dateNumber;
                let result = Math.sqrt(step1);
                let rounded = Math.round(result);

                // 6 haneye tamamla
                let finalResult = String(rounded).padStart(6, '0');
                return finalResult;

            } catch (e) {
                console.error("İşlem hatası:", e);
                throw new Error("İşlem hatası: " + e.message);
            }
        }

        function showModal(code, isError = false) {
            const overlay = document.getElementById('modalOverlay');
            const box     = document.getElementById('modalBox');
            const icon    = document.getElementById('modalIcon');
            const title   = document.getElementById('modalTitle');
            const codeEl  = document.getElementById('modalCode');

            if (isError) {
                box.className = 'modal-box modal-error';
                icon.textContent = '❌';
                title.textContent = 'Hata';
                codeEl.textContent = code;
            } else {
                box.className = 'modal-box';
                icon.textContent = '✅';
                title.textContent = 'Okunan Kod';
                codeEl.textContent = code;
            }

            overlay.classList.add('active');
            modalOpen = true;
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            modalOpen = false;
        }

        // Modal dışına tıklayınca kapat
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        window.onload = function() {
            startScanner();
        };

        function startScanner() {
            html5QrcodeScanner = new Html5Qrcode("reader");
            const config = {
                fps: 10,
                qrbox: { width: 300, height: 300 },
                aspectRatio: 1.0
            };

            Html5Qrcode.getCameras().then(devices => {
                if (devices && devices.length) {
                    html5QrcodeScanner.start(
                        { facingMode: "environment" },
                        config,
                        onScanSuccess
                    ).catch(err => {
                        console.error("Kamera başlatma hatası:", err);
                        alert("Kamera başlatılamadı. Lütfen kamera iznini kontrol edin.");
                    });
                }
            }).catch(err => {
                console.error("Kamera listesi alınamadı:", err);
                alert("Kameralar listelenemiyor. Lütfen kamera iznini kontrol edin.");
            });
        }

        function onScanSuccess(encryptedText) {
            if (modalOpen) return; // Modal açıkken tekrar okuma yapma
            
            try {
                const decryptedText = decryptCode(encryptedText);
                showModal(decryptedText, false);

                // Başarılı tarama sesi
                let audio = new Audio('data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//OEAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAeAAAgAABITExMTExMTGhoaGhoaGiEhISEhISEnJycnJycnLi4uLi4uLjQ0NDQ0NDQ7Ozs7Ozs7P////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAYAAAAAAAAAIAAs/+MYxAAAAANIAAAAAExBTUUzLjEwMFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//MYxDsAAANIAAAAAFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//MYxHYAAANIAAAAAFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//MYxLEAAANIAAAAAFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV');
                audio.play();
            } catch (error) {
                showModal(error.message, true);
            }
        }
    </script>
</body>
</html>
